<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="V Barbershop — precision cuts, classic hot towel shaves and modern styling by master barbers."
    />
    <title>V Barbershop — Sharp looks. Timeless craft.</title>

    <!-- Set theme before first paint to avoid a flash of the wrong theme -->
    <script>
      try {
        var t = localStorage.getItem('theme')
        if (t === 'light' || t === 'dark') {
          document.documentElement.dataset.theme = t
        }
      } catch (e) {}
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
